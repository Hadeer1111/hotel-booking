services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel-booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotel_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotel_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: hotel-booking-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hotel_booking?schema=public
      NODE_ENV: development
      PORT: 4000
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      JWT_ACCESS_TTL: 900s
      JWT_REFRESH_TTL: 7d
      BCRYPT_ROUNDS: 12
      PAYMENTS_PROVIDER: mock
      CORS_ORIGIN: http://localhost:3000
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 20
      LOG_LEVEL: debug
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
    command: ["pnpm", "--filter", "@hotel-booking/api", "dev"]

  web:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: hotel-booking-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/v1
      INTERNAL_API_URL: http://api:4000/v1
      NEXT_PUBLIC_PAYMENTS_PROVIDER: mock
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
    command: ["pnpm", "--filter", "@hotel-booking/web", "dev"]

volumes:
  postgres_data:
